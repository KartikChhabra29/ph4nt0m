name: PH4NT0M Package Pipeline

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:

  build-linux:
    name: Build & Security Checks
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Pip Packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Upgrade Pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install Development Tools
        run: |
          pip install \
            black \
            ruff \
            pytest \
            pytest-asyncio \
            bandit \
            safety \
            mypy

      - name: Run Black Formatter
        run: |
          black --check .

      - name: Run Ruff Linter
        run: |
          ruff check .

      - name: Run MyPy Type Checker
        run: |
          mypy . || true

      - name: Run Security Scan
        run: |
          bandit -r . -ll -x tests

      - name: Run Dependency Vulnerability Scan
        run: |
          safety check || true

      - name: Run Unit Tests
        run: |
          pytest -v || true

      - name: Verify PH4NT0M Syntax
        run: |
          python -m py_compile ph4nt0m.py

      - name: Display Python Version
        run: |
          python --version

  docker-build:
    name: Docker Image Verification
    runs-on: ubuntu-latest

    needs: build-linux

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t ph4nt0m .

      - name: Verify Docker Image
        run: |
          docker images

  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest

    needs:
      - build-linux
      - docker-build

    steps:

      - name: PH4NT0M Build Summary
        run: |
          echo "=================================="
          echo "PH4NT0M PIPELINE COMPLETED"
          echo "=================================="
          echo "Python Versions Tested:"
          echo " - Python 3.10"
          echo " - Python 3.11"
          echo " - Python 3.12"
          echo ""
          echo "Checks Completed:"
          echo " - Black"
          echo " - Ruff"
          echo " - MyPy"
          echo " - Bandit"
          echo " - Safety"
          echo " - Pytest"
          echo ""
          echo "Docker Build Successful"
          echo "=================================="
